// ================================================================
// Context: Cart
// ================================================================
const CartContext = createContext();

function cartReducer(state, action) {
  switch (action.type) {
    case 'ADD_ITEM': {
      const existing = state.items.find(i => i.productId === action.payload.productId);
      let newItems;
      if (existing) {
        newItems = state.items.map(i =>
          i.productId === action.payload.productId
            ? { ...i, quantity: i.quantity + action.payload.quantity, lineTotal: (i.quantity + action.payload.quantity) * i.price }
            : i
        );
      } else {
        newItems = [...state.items, { ...action.payload, lineTotal: action.payload.price * action.payload.quantity }];
      }
      return recalculate({ ...state, items: newItems });
    }
    case 'UPDATE_QUANTITY': {
      const newItems = state.items.map(i =>
        i.productId === action.payload.productId
          ? { ...i, quantity: action.payload.quantity, lineTotal: action.payload.quantity * i.price }
          : i
      );
      return recalculate({ ...state, items: newItems });
    }
    case 'REMOVE_ITEM': {
      const newItems = state.items.filter(i => i.productId !== action.payload.productId);
      return recalculate({ ...state, items: newItems });
    }
    case 'APPLY_COUPON': {
      const discount = calculateCouponDiscount(action.payload, state.subtotal);
      return recalculate({ ...state, couponCode: action.payload, discount });
    }
    case 'CLEAR_CART':
      return { items: [], subtotal: 0, discount: 0, total: 0, couponCode: null, itemCount: 0 };
    default:
      return state;
  }
}

function recalculate(state) {
  const subtotal = state.items.reduce((acc, item) => acc + item.lineTotal, 0);
  const itemCount = state.items.reduce((acc, item) => acc + item.quantity, 0);
  const total = Math.max(0, subtotal - (state.discount || 0));
  return { ...state, subtotal, itemCount, total };
}

function calculateCouponDiscount(code, subtotal) {
  switch (code.toUpperCase()) {
    case 'SAVE10': return subtotal * 0.10;
    case 'SAVE20': return subtotal * 0.20;
    case 'FLAT50': return Math.min(50, subtotal);
    default: return 0;
  }
}

function CartProvider({ children }) {
  const [cart, dispatch] = useReducer(cartReducer, {
    items: [], subtotal: 0, discount: 0, total: 0, couponCode: null, itemCount: 0
  });
  return (<CartContext.Provider value={{ cart, dispatch }}>{children}</CartContext.Provider>);
}

function useCart() {
  const context = useContext(CartContext);
  if (!context) throw new Error('useCart must be used within CartProvider');
  return context;
}

// ================================================================
// Context: Toast
// ================================================================
const ToastContext = createContext();

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const toastIdRef = useRef(0);

  const addToast = useCallback((message, type = 'success') => {
    const id = ++toastIdRef.current;
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="toast-container" role="status" aria-live="polite" aria-label="Notifications">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast--${t.type}`} role="alert">
            <span className="toast__icon">{t.type === 'success' ? '✓' : '✕'}</span>
            <span className="toast__message">{t.message}</span>
            <button className="toast__close" onClick={() => removeToast(t.id)} aria-label="Dismiss notification">×</button>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return useContext(ToastContext); }

// ================================================================
// Hook: useFetchProducts
// ================================================================
function useFetchProducts() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const controller = new AbortController();
    async function fetchProducts() {
      setLoading(true);
      setError(null);
      try {
        const response = await fetch(`${API_BASE}/products`, { signal: controller.signal });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!cancelled) { setProducts(data.content || data); setLoading(false); }
      } catch (err) {
        if (err.name === 'AbortError') return;
        if (!cancelled) { setProducts(MOCK_PRODUCTS); setLoading(false); }
      }
    }
    fetchProducts();
    return () => { cancelled = true; controller.abort(); };
  }, []);

  return { products, loading, error };
}

// ================================================================
// Component: ProductCard
// ================================================================
function ProductCard({ product, style }) {
  const { dispatch } = useCart();
  const { addToast } = useToast();
  const isOutOfStock = product.stock === 0;

  const handleAddToCart = (e) => {
    e.stopPropagation();
    if (isOutOfStock) return;
    dispatch({ type: 'ADD_ITEM', payload: { productId: product.id, productName: product.name, imageUrl: product.imageUrl, price: product.price, quantity: 1, category: product.category } });
    addToast(`${product.name} added to cart`);
  };

  const renderStars = (rating) => {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5;
    return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
  };

  const stockLabel = isOutOfStock
    ? { text: 'Out of Stock', cls: 'out' }
    : product.stock <= 10 ? { text: `Only ${product.stock} left`, cls: 'low' }
    : { text: 'In Stock', cls: 'available' };

  return (
    <article className="product-card" style={style} role="article"
             aria-label={`${product.name}, $${product.price.toFixed(2)}`} id={`product-${product.id}`}>
      <div className="product-card__image-wrapper">
        <img className="product-card__image" src={product.imageUrl} alt={product.name} loading="lazy" />
        {product.rating >= 4.7 && <span className="product-card__badge" aria-label="Top rated">Top Rated</span>}
        <button className="product-card__wishlist" aria-label={`Add ${product.name} to wishlist`}>♡</button>
      </div>
      <div className="product-card__body">
        <span className="product-card__category">{product.category}</span>
        <h3 className="product-card__name">{product.name}</h3>
        <div className="product-card__rating" aria-label={`Rating: ${product.rating} out of 5`}>
          <span className="product-card__stars" aria-hidden="true">{renderStars(product.rating)}</span>
          <span className="product-card__rating-text">{product.rating}</span>
        </div>
        <div className="product-card__footer">
          <div className="product-card__price"><span className="product-card__price-currency">$</span>{product.price.toFixed(2)}</div>
          <button className="product-card__add-btn" onClick={handleAddToCart} disabled={isOutOfStock}
                  aria-label={isOutOfStock ? `${product.name} is out of stock` : `Add ${product.name} to cart`}
                  id={`add-to-cart-${product.id}`}>
            {isOutOfStock ? '✕' : '+'}
          </button>
        </div>
        <div className={`product-card__stock product-card__stock--${stockLabel.cls}`}>{stockLabel.text}</div>
      </div>
    </article>
  );
}

// ================================================================
// Page: Product Listing
// ================================================================
function ProductListingPage() {
  const { products, loading, error } = useFetchProducts();
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('');
  const [sortBy, setSortBy] = useState('name');
  const [showHero, setShowHero] = useState(true);
  const categories = [...new Set(products.map(p => p.category))].sort();

  const filtered = products
    .filter(p => {
      const matchesSearch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.description.toLowerCase().includes(search.toLowerCase());
      return matchesSearch && (!category || p.category === category);
    })
    .sort((a, b) => {
      switch (sortBy) {
        case 'price-asc': return a.price - b.price;
        case 'price-desc': return b.price - a.price;
        case 'rating': return b.rating - a.rating;
        default: return a.name.localeCompare(b.name);
      }
    });

  if (error) return (<div className="page"><div className="error-state" role="alert"><span className="error-state__icon">⚠️</span><h2 className="error-state__title">Unable to Load Products</h2><p className="error-state__message">{error}</p><button className="btn btn--primary" onClick={() => window.location.reload()}>Try Again</button></div></div>);

  return (
    <div className="page">
      {showHero && (
        <section className="hero" aria-label="Welcome banner">
          <div className="hero__badge"><span className="hero__badge-dot"></span>New Collection Available</div>
          <h1 className="hero__title">Discover <span className="hero__title-accent">Premium</span><br />Products You'll Love</h1>
          <p className="hero__description">Curated collections from top brands. Free shipping on orders over $99. Quality guaranteed with every purchase.</p>
          <div className="hero__actions">
            <button className="btn btn--primary btn--lg" onClick={() => setShowHero(false)}>Shop Now →</button>
            <button className="btn btn--secondary btn--lg">View Collections</button>
          </div>
        </section>
      )}
      <div className="page__header">
        <h2 className="page__title page__title--gradient">All Products</h2>
        <p className="page__subtitle">{filtered.length} products available</p>
      </div>
      <div className="filter-bar" role="search" aria-label="Product filters">
        <input className="filter-bar__search" type="search" placeholder="Search products..." value={search}
               onChange={(e) => setSearch(e.target.value)} aria-label="Search products" id="product-search" />
        <select className="filter-bar__select" value={category} onChange={(e) => setCategory(e.target.value)}
                aria-label="Filter by category" id="category-filter">
          <option value="">All Categories</option>
          {categories.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <select className="filter-bar__select" value={sortBy} onChange={(e) => setSortBy(e.target.value)}
                aria-label="Sort products" id="sort-products">
          <option value="name">Sort by Name</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      {loading ? <ProductGridSkeleton /> : filtered.length === 0 ? (
        <div className="empty-state"><span className="empty-state__icon">🔍</span><h3 className="empty-state__title">No Products Found</h3><p className="empty-state__description">Try adjusting your search or filters.</p><button className="btn btn--secondary" onClick={() => { setSearch(''); setCategory(''); }}>Clear Filters</button></div>
      ) : (
        <div className="product-grid" role="list" aria-label="Product catalog">
          {filtered.map((product, i) => <ProductCard key={product.id} product={product} style={{ animationDelay: `${i * 60}ms` }} />)}
        </div>
      )}
    </div>
  );
}

function CartPage({ onNavigate }) {
  const { cart, dispatch } = useCart();
  const { addToast } = useToast();
  const [couponInput, setCouponInput] = useState('');

  const handleApplyCoupon = () => {
    const valid = ['SAVE10', 'SAVE20', 'FLAT50'];
    if (valid.includes(couponInput.toUpperCase())) {
      dispatch({ type: 'APPLY_COUPON', payload: couponInput });
      addToast(`Coupon "${couponInput.toUpperCase()}" applied!`);
    } else addToast('Invalid coupon code', 'error');
  };

  if (cart.items.length === 0) return (
    <div className="page"><div className="page__header"><h1 className="page__title page__title--gradient">Shopping Cart</h1></div>
      <div className="empty-state"><span className="empty-state__icon">🛒</span><h2 className="empty-state__title">Your Cart is Empty</h2>
        <p className="empty-state__description">Looks like you haven't added any items yet. Explore our products and find something you love!</p>
        <button className="btn btn--primary" onClick={() => onNavigate('products')}>Browse Products</button></div></div>
  );

  return (
    <div className="page">
      <div className="page__header"><h1 className="page__title page__title--gradient">Shopping Cart</h1><p className="page__subtitle">{cart.itemCount} item{cart.itemCount !== 1 ? 's' : ''} in your cart</p></div>
      <div className="cart-layout">
        <div className="cart-items" role="list" aria-label="Cart items">
          {cart.items.map((item, i) => (
            <div key={item.productId} className="cart-item" role="listitem" style={{ animationDelay: `${i * 100}ms` }}
                 aria-label={`${item.productName}, quantity ${item.quantity}, $${item.lineTotal.toFixed(2)}`}>
              <img className="cart-item__image" src={item.imageUrl} alt={item.productName} loading="lazy" />
              <div className="cart-item__info">
                <span className="cart-item__category">{item.category}</span>
                <h3 className="cart-item__name">{item.productName}</h3>
                <span className="cart-item__price">${item.price.toFixed(2)}</span>
                <div className="cart-item__actions">
                  <div className="cart-item__qty" role="group" aria-label={`Quantity for ${item.productName}`}>
                    <button className="cart-item__qty-btn" onClick={() => { if (item.quantity > 1) dispatch({ type: 'UPDATE_QUANTITY', payload: { productId: item.productId, quantity: item.quantity - 1 } }); }} disabled={item.quantity <= 1} aria-label="Decrease quantity">−</button>
                    <input className="cart-item__qty-value" type="text" readOnly value={item.quantity} aria-label="Current quantity" />
                    <button className="cart-item__qty-btn" onClick={() => dispatch({ type: 'UPDATE_QUANTITY', payload: { productId: item.productId, quantity: item.quantity + 1 } })} aria-label="Increase quantity">+</button>
                  </div>
                  <button className="cart-item__remove" onClick={() => { dispatch({ type: 'REMOVE_ITEM', payload: { productId: item.productId } }); addToast(`${item.productName} removed from cart`); }} aria-label={`Remove ${item.productName} from cart`}>Remove</button>
                </div>
              </div>
            </div>
          ))}
        </div>
        <aside className="cart-summary" aria-label="Order summary">
          <h2 className="cart-summary__title">Order Summary</h2>
          <div className="cart-summary__row"><span className="cart-summary__label">Subtotal ({cart.itemCount} items)</span><span className="cart-summary__value">${cart.subtotal.toFixed(2)}</span></div>
          {cart.discount > 0 && <div className="cart-summary__row"><span className="cart-summary__label">Discount ({cart.couponCode})</span><span className="cart-summary__value cart-summary__value--discount">−${cart.discount.toFixed(2)}</span></div>}
          <div className="cart-summary__row"><span className="cart-summary__label">Shipping</span><span className="cart-summary__value" style={{color: 'var(--color-accent-success)'}}>{cart.subtotal >= 99 ? 'FREE' : '$9.99'}</span></div>
          <hr className="cart-summary__divider" />
          <div className="cart-summary__total"><span className="cart-summary__total-label">Total</span><span className="cart-summary__total-value">${(cart.total + (cart.subtotal < 99 ? 9.99 : 0)).toFixed(2)}</span></div>
          <div className="cart-summary__coupon">
            <input className="cart-summary__coupon-input" type="text" placeholder="Coupon code" value={couponInput} onChange={(e) => setCouponInput(e.target.value)} aria-label="Enter coupon code" id="coupon-input" />
            <button className="btn btn--secondary btn--sm" onClick={handleApplyCoupon} id="apply-coupon-btn">Apply</button>
          </div>
          <button className="btn btn--primary cart-summary__checkout-btn" onClick={() => onNavigate('checkout')} id="proceed-to-checkout">Proceed to Checkout →</button>
        </aside>
      </div>
    </div>
  );
}

function CheckoutPage({ onNavigate }) {

  const [formData, setFormData] = useState({ fullName: '', email: '', phone: '', address: '', city: '', state: '', zip: '' });
  const [errors, setErrors] = useState({});

  const handleChange = (field) => (e) => { setFormData(prev => ({ ...prev, [field]: e.target.value })); if (errors[field]) setErrors(prev => ({ ...prev, [field]: null })); };

  const validate = () => {
    const e = {};
    if (!formData.fullName.trim()) e.fullName = 'Full name is required';
    if (!formData.email.trim()) e.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) e.email = 'Invalid email';
    if (!formData.phone.trim()) e.phone = 'Phone is required';
    if (!formData.address.trim()) e.address = 'Address is required';
    if (!formData.city.trim()) e.city = 'City is required';
    if (!formData.state.trim()) e.state = 'State is required';
    if (!formData.zip.trim()) e.zip = 'ZIP code is required';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!validate()) { addToast('Please fill in all required fields', 'error'); return; }
    setProcessing(true);
    await new Promise(r => setTimeout(r, 2000));
    setOrderId(`ORD-${Date.now().toString(36).toUpperCase()}`);
    setOrderPlaced(true);
    dispatch({ type: 'CLEAR_CART' });
    setProcessing(false);
    addToast('Order placed successfully!');
  };

  if (cart.items.length === 0 && !orderPlaced) return (
    <div className="page"><div className="empty-state"><span className="empty-state__icon">🛒</span><h1 className="empty-state__title">Cart is Empty</h1><p className="empty-state__description">Add items to your cart before checkout.</p><button className="btn btn--primary" onClick={() => onNavigate('products')}>Browse Products</button></div></div>
  );

  if (orderPlaced) return (
    <div className="page"><div className="order-confirmation" role="status"><div className="order-confirmation__icon">✓</div><h1 className="order-confirmation__title">Order Confirmed!</h1><p className="order-confirmation__order-id">Order ID: <span>{orderId}</span></p><p className="page__subtitle" style={{ marginBottom: '32px' }}>Thank you for your purchase. You'll receive a confirmation email shortly.</p><button className="btn btn--primary btn--lg" onClick={() => onNavigate('products')}>Continue Shopping</button></div></div>
  );

  const renderInput = (field, label, type, placeholder) => (
    <div className="form-group">
      <label className="form-group__label" htmlFor={`checkout-${field}`}>{label} *</label>
      <input className={`form-group__input ${errors[field] ? 'form-group__input--error' : ''}`} type={type} id={`checkout-${field}`} value={formData[field]} onChange={handleChange(field)} placeholder={placeholder} aria-required="true" aria-invalid={!!errors[field]} />
      {errors[field] && <span className="form-group__error" role="alert">{errors[field]}</span>}
    </div>
  );

  return (
    <div className="page">
      <div className="page__header"><h1 className="page__title page__title--gradient">Checkout</h1><p className="page__subtitle">Complete your order</p></div>
      <form className="checkout-layout" onSubmit={handleSubmit} noValidate>
        <div className="checkout-form">
          <section className="form-section" aria-label="Shipping information">
            <h2 className="form-section__title"><span className="form-section__title-number">1</span>Shipping Information</h2>
            {renderInput('fullName', 'Full Name', 'text', 'John Doe')}
            <div className="form-row">{renderInput('email', 'Email', 'email', 'john@example.com')}{renderInput('phone', 'Phone', 'tel', '+1 (555) 123-4567')}</div>
            {renderInput('address', 'Address', 'text', '123 Main Street, Apt 4B')}
            <div className="form-row">{renderInput('city', 'City', 'text', 'New York')}{renderInput('state', 'State', 'text', 'NY')}</div>
            <div style={{ maxWidth: '200px' }}>{renderInput('zip', 'ZIP Code', 'text', '10001')}</div>
          </section>
          <section className="form-section" aria-label="Payment method">
            <h2 className="form-section__title"><span className="form-section__title-number">2</span>Payment Method</h2>
            <div className="payment-methods" role="radiogroup" aria-label="Select payment method">
              {[{ id: 'credit_card', icon: '💳', name: 'Credit Card' }, { id: 'debit_card', icon: '🏦', name: 'Debit Card' }, { id: 'upi', icon: '📱', name: 'UPI' }, { id: 'net_banking', icon: '🌐', name: 'Net Banking' }].map(m => (
                <div key={m.id} className={`payment-method ${paymentMethod === m.id ? 'selected' : ''}`} role="radio" aria-checked={paymentMethod === m.id} tabIndex={0} onClick={() => setPaymentMethod(m.id)} onKeyDown={(e) => e.key === 'Enter' && setPaymentMethod(m.id)} aria-label={m.name}>
                  <div className="payment-method__icon">{m.icon}</div><div className="payment-method__name">{m.name}</div>
                </div>
              ))}
            </div>
          </section>
        </div>
        <aside className="cart-summary" aria-label="Order summary">
          <h2 className="cart-summary__title">Order Summary</h2>
          {cart.items.map(item => (<div key={item.productId} className="cart-summary__row"><span className="cart-summary__label" style={{ fontSize: '0.85rem' }}>{item.productName} × {item.quantity}</span><span className="cart-summary__value">${item.lineTotal.toFixed(2)}</span></div>))}
          <hr className="cart-summary__divider" />
          <div className="cart-summary__row"><span className="cart-summary__label">Subtotal</span><span className="cart-summary__value">${cart.subtotal.toFixed(2)}</span></div>
          {cart.discount > 0 && <div className="cart-summary__row"><span className="cart-summary__label">Discount</span><span className="cart-summary__value cart-summary__value--discount">−${cart.discount.toFixed(2)}</span></div>}
          <div className="cart-summary__row"><span className="cart-summary__label">Shipping</span><span className="cart-summary__value" style={{color: 'var(--color-accent-success)'}}>{cart.subtotal >= 99 ? 'FREE' : '$9.99'}</span></div>
          <div className="cart-summary__row"><span className="cart-summary__label">Tax (8%)</span><span className="cart-summary__value">${(cart.subtotal * 0.08).toFixed(2)}</span></div>
          <hr className="cart-summary__divider" />
          <div className="cart-summary__total"><span className="cart-summary__total-label">Total</span><span className="cart-summary__total-value">${(cart.total + (cart.subtotal < 99 ? 9.99 : 0) + cart.subtotal * 0.08).toFixed(2)}</span></div>
          <button className="btn btn--primary cart-summary__checkout-btn" type="submit" disabled={processing} id="place-order-btn">{processing ? 'Processing...' : 'Place Order →'}</button>
        </aside>
      </form>
    </div>
  );
}

// ================================================================
// App
// ================================================================
function App() {
  const [currentPage, setCurrentPage] = useState('products');
  const handleNavigate = useCallback((page) => { setCurrentPage(page); window.scrollTo({ top: 0, behavior: 'smooth' }); }, []);

  const renderPage = () => {
    switch (currentPage) {
      case 'products': return <ProductListingPage />;
      case 'cart': return <CartPage onNavigate={handleNavigate} />;
      case 'checkout': return <CheckoutPage onNavigate={handleNavigate} />;
      default: return <ProductListingPage />;
    }
  };

  return (<CartProvider><ToastProvider><Navigation currentPage={currentPage} onNavigate={handleNavigate} /><main id="main-content" role="main">{renderPage()}</main></ToastProvider></CartProvider>);
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);
    </script>
</body>
</html>
