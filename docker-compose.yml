version: '3.8'

services:
  # =========================================================
  # DATABASES
  # =========================================================
  postgres-product:
    image: postgres:15-alpine
    container_name: product_db
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - "5432:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:15-alpine
    container_name: order_db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - "5433:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - "5434:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:15-alpine
    container_name: user_db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - "5435:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-cart:
    image: redis:7-alpine
    container_name: cart_redis
    ports:
      - "6379:6379"
    volumes:
      - cart_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================================
  # API GATEWAY
  # =========================================================
  api-gateway:
    build: 
      context: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - product-service
      - cart-service
      - order-service
      - payment-service
      - user-service

  # =========================================================
  # MICROSERVICES
  # =========================================================
  product-service:
    build: 
      context: ./backend/product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-product:5432/product_db
      - SPRING_DATASOURCE_USERNAME=shop_user
      - SPRING_DATASOURCE_PASSWORD=shop_password
    depends_on:
      postgres-product:
        condition: service_healthy

  cart-service:
    build: 
      context: ./backend/cart-service
    container_name: cart-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_REDIS_HOST=redis-cart
      - SPRING_DATA_REDIS_PORT=6379
      - PRODUCT_SERVICE_URL=http://product-service:8081
    depends_on:
      redis-cart:
        condition: service_healthy
      product-service:
        condition: service_started

  order-service:
    build: 
      context: ./backend/order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-order:5432/order_db
      - SPRING_DATASOURCE_USERNAME=shop_user
      - SPRING_DATASOURCE_PASSWORD=shop_password
      - CART_SERVICE_URL=http://cart-service:8082
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - PAYMENT_SERVICE_URL=http://payment-service:8084
    depends_on:
      postgres-order:
        condition: service_healthy
      cart-service:
        condition: service_started
      product-service:
        condition: service_started

  payment-service:
    build: 
      context: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-payment:5432/payment_db
      - SPRING_DATASOURCE_USERNAME=shop_user
      - SPRING_DATASOURCE_PASSWORD=shop_password
    depends_on:
      postgres-payment:
        condition: service_healthy

  user-service:
    build: 
      context: ./backend/user-service
    container_name: user-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-user:5432/user_db
      - SPRING_DATASOURCE_USERNAME=shop_user
      - SPRING_DATASOURCE_PASSWORD=shop_password
    depends_on:
      postgres-user:
        condition: service_healthy

volumes:
  product_db_data:
  order_db_data:
  payment_db_data:
  user_db_data:
  cart_redis_data:
