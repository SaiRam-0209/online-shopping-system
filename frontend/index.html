// Context: Cart
// ================================================================
const CartContext = createContext();

function cartReducer(state, action) {
  switch (action.type) {
    case 'ADD_ITEM': {
      const existing = state.items.find(i => i.productId === action.payload.productId);
      let newItems;
      if (existing) {
        newItems = state.items.map(i =>
          i.productId === action.payload.productId
            ? { ...i, quantity: i.quantity + action.payload.quantity, lineTotal: (i.quantity + action.payload.quantity) * i.price }
            : i
        );
      } else {
        newItems = [...state.items, { ...action.payload, lineTotal: action.payload.price * action.payload.quantity }];
      }
      return recalculate({ ...state, items: newItems });
    }
    case 'UPDATE_QUANTITY': {
      const newItems = state.items.map(i =>
        i.productId === action.payload.productId
          ? { ...i, quantity: action.payload.quantity, lineTotal: action.payload.quantity * i.price }
          : i
      );
      return recalculate({ ...state, items: newItems });
    }
    case 'REMOVE_ITEM': {
      const newItems = state.items.filter(i => i.productId !== action.payload.productId);
      return recalculate({ ...state, items: newItems });
    }
    case 'APPLY_COUPON': {
      const discount = calculateCouponDiscount(action.payload, state.subtotal);
      return recalculate({ ...state, couponCode: action.payload, discount });
    }
    case 'CLEAR_CART':
      return { items: [], subtotal: 0, discount: 0, total: 0, couponCode: null, itemCount: 0 };
    default:
      return state;
  }
}

function recalculate(state) {
  const subtotal = state.items.reduce((acc, item) => acc + item.lineTotal, 0);
  const itemCount = state.items.reduce((acc, item) => acc + item.quantity, 0);
  const total = Math.max(0, subtotal - (state.discount || 0));
  return { ...state, subtotal, itemCount, total };
}

function calculateCouponDiscount(code, subtotal) {
  switch (code.toUpperCase()) {
    case 'SAVE10': return subtotal * 0.10;
    case 'SAVE20': return subtotal * 0.20;
    case 'FLAT50': return Math.min(50, subtotal);
    default: return 0;
  }
}

function CartProvider({ children }) {
  const [cart, dispatch] = useReducer(cartReducer, {
    items: [], subtotal: 0, discount: 0, total: 0, couponCode: null, itemCount: 0
  });
  return (<CartContext.Provider value={{ cart, dispatch }}>{children}</CartContext.Provider>);
}

function useCart() {
  const context = useContext(CartContext);
  if (!context) throw new Error('useCart must be used within CartProvider');
  return context;
}

// Context: Toast
// ================================================================
const ToastContext = createContext();

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const toastIdRef = useRef(0);

  const addToast = useCallback((message, type = 'success') => {
    const id = ++toastIdRef.current;
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="toast-container" role="status" aria-live="polite" aria-label="Notifications">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast--${t.type}`} role="alert">
            <span className="toast__icon">{t.type === 'success' ? '✓' : '✕'}</span>
            <span className="toast__message">{t.message}</span>
            <button className="toast__close" onClick={() => removeToast(t.id)} aria-label="Dismiss notification">×</button>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return useContext(ToastContext); }

// Hook: useFetchProducts
// ================================================================
function useFetchProducts() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const controller = new AbortController();
    async function fetchProducts() {
      setLoading(true);
      setError(null);
      try {
        const response = await fetch(`${API_BASE}/products`, { signal: controller.signal });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!cancelled) { setProducts(data.content || data); setLoading(false); }
      } catch (err) {
        if (err.name === 'AbortError') return;
        if (!cancelled) { setProducts(MOCK_PRODUCTS); setLoading(false); }
      }
    }
    fetchProducts();
    return () => { cancelled = true; controller.abort(); };
  }, []);

  return { products, loading, error };
}

const CHAT_STATUS_ENDPOINT = '/api/chat/status';
const CHAT_COMPLETION_ENDPOINT = '/api/chat';

function normalizeAssistantText(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

function tokenizeAssistantText(text) {
  return normalizeAssistantText(text).split(' ').filter(Boolean).filter(token => !SHOP_ASSISTANT_STOP_WORDS.has(token));
}

function formatAssistantCurrency(value) {
  return `₹${Number(value || 0).toFixed(2)}`;
}

function createAssistantWelcomeMessage() {
  return {
    id: 'assistant-welcome',
    role: 'assistant',
    text: "I'm the ShopNova Assistant. I can always answer from built-in ShopNova knowledge, and if the local server is started with your Gemini API key I can also use live AI replies about this application.",
    suggestions: SHOP_ASSISTANT_DEFAULT_SUGGESTIONS
  };
}

function scoreKnowledgeEntry(entry, normalizedQuestion, questionTokens) {
  let score = 0;
  for (const keyword of entry.keywords) {
    const normalizedKeyword = normalizeAssistantText(keyword);
    if (!normalizedKeyword) continue;
    if (normalizedQuestion.includes(normalizedKeyword)) score += normalizedKeyword.includes(' ') ? 6 : 3;
    for (const token of normalizedKeyword.split(' ')) {
      if (questionTokens.has(token)) score += 1;
    }
  }
  return score;
}

function findKnowledgeBaseReply(question) {
  const normalizedQuestion = normalizeAssistantText(question);
  const questionTokens = new Set(tokenizeAssistantText(question));
  let bestEntry = null;
  let bestScore = 0;

  for (const entry of SHOP_ASSISTANT_KNOWLEDGE_BASE) {
    const score = scoreKnowledgeEntry(entry, normalizedQuestion, questionTokens);
    if (score > bestScore) {
      bestEntry = entry;
      bestScore = score;
    }
  }

  if (!bestEntry || bestScore < 3) return null;
  return { text: bestEntry.answer, suggestions: bestEntry.suggestions };
}

function buildCatalogSummary() {
  const categories = [...new Set(MOCK_PRODUCTS.map(product => product.category))];
  return `The demo catalog currently includes ${MOCK_PRODUCTS.length} products across ${categories.join(', ')}. The Products page lets shoppers search, filter by category, and sort by name, price, or rating.`;
}

function buildCartSummary(cart) {
  if (cart.itemCount === 0) {
    return 'Your cart is empty right now. Add items from the Products page first, then the Cart page will show subtotal, shipping, coupons, and the path into checkout.';
  }

  const shipping = cart.subtotal >= 99 ? 0 : 9.99;
  const tax = cart.subtotal * 0.08;
  const estimatedTotal = cart.total + shipping + tax;
  const discountText = cart.discount > 0 ? ` Discount (${cart.couponCode}): -₹${cart.discount.toFixed(2)}.` : '';
  const itemPreview = cart.items.slice(0, 3).map(item => `${item.productName} x${item.quantity}`).join(', ');

  return `You currently have ${cart.itemCount} item${cart.itemCount === 1 ? '' : 's'} in the cart. Subtotal: ${formatAssistantCurrency(cart.subtotal)}.${discountText} Shipping: ${shipping === 0 ? 'FREE' : formatAssistantCurrency(shipping)}. Estimated total with 8% tax: ${formatAssistantCurrency(estimatedTotal)}.${itemPreview ? ` Items: ${itemPreview}.` : ''}`;
}

function getNavigationReply(normalizedQuestion, context) {
  const wantsNavigation = /(open|go to|take me to|navigate|switch to|bring me|show page)/.test(normalizedQuestion);
  if (!wantsNavigation) return null;

  if (/(products|catalog|home|store)/.test(normalizedQuestion)) {
    return {
      text: context.currentPage === 'products' ? 'You are already on the Products page.' : 'I opened the Products page for you.',
      suggestions: ['How many products are in the demo?', 'How do search and filters work?', 'What does this app do?'],
      actionPage: 'products'
    };
  }

  if (/(cart|bag|basket)/.test(normalizedQuestion)) {
    return {
      text: context.currentPage === 'cart' ? 'You are already on the Cart page.' : 'I opened the Cart page for you.',
      suggestions: ['What coupon codes work?', "What's in my cart?", 'How does checkout work?'],
      actionPage: 'cart'
    };
  }

  if (/checkout/.test(normalizedQuestion)) {
    const emptyCartNote = context.cart.itemCount === 0
      ? ' Your cart is empty right now, so the demo will ask you to add items before completing checkout.'
      : '';

    return {
      text: `${context.currentPage === 'checkout' ? 'You are already on the Checkout page.' : 'I opened the Checkout page for you.'}${emptyCartNote}`,
      suggestions: ['What payment methods are available?', "What's in my cart?", 'How does order confirmation work?'],
      actionPage: 'checkout'
    };
  }

  return null;
}

function resolveAssistantReply(question, context) {
  const normalizedQuestion = normalizeAssistantText(question);

  if (!normalizedQuestion) {
    return { text: 'Ask me something about ShopNova and I will answer from the app itself.', suggestions: SHOP_ASSISTANT_DEFAULT_SUGGESTIONS };
  }

  if (/api key|free key|token/.test(normalizedQuestion)) {
    return {
      text: 'This chatbot is configured to work without any external API key. It answers from built-in ShopNova knowledge plus live page and cart state. If you later want a cloud AI model, you can wire in your own provider key, but this version already works as-is.',
      suggestions: ['How does the chatbot work?', 'Is the backend fully runnable?', 'Which services exist?']
    };
  }

  if (/where am i|current page|which page/.test(normalizedQuestion)) {
    const pageLabel = SHOP_ASSISTANT_PAGE_LABELS[context.currentPage] || 'Products';
    return {
      text: `You are currently on the ${pageLabel} page.`,
      suggestions: ['Open cart', 'Open checkout', 'What does this page do?']
    };
  }

  if (/(cart|bag|basket)/.test(normalizedQuestion) && /(what s in|what is in|how many|item|total|subtotal|shipping|discount|coupon|summary)/.test(normalizedQuestion)) {
    return {
      text: buildCartSummary(context.cart),
      suggestions: ['What coupon codes work?', 'Open cart', 'How does checkout work?']
    };
  }

  if (/coupon|discount|promo/.test(normalizedQuestion)) {
    return {
      text: 'The cart supports three demo coupon codes: SAVE10 for 10% off, SAVE20 for 20% off, and FLAT50 for up to ₹50 off. Apply them from the Cart page.',
      suggestions: ['Open cart', "What's in my cart?", 'How does checkout work?']
    };
  }

  if (/add to cart|quantity|remove item/.test(normalizedQuestion)) {
    return {
      text: 'Products can be added from the Products page with the Add to Cart button. The Cart page lets you increase or decrease quantity, remove items, and apply coupons before checkout.',
      suggestions: ['Open products', 'Open cart', 'What coupon codes work?']
    };
  }

  if (/payment|upi|credit card|debit card|net banking/.test(normalizedQuestion)) {
    return {
      text: 'The checkout page offers four demo payment options: Credit Card, Debit Card, UPI, and Net Banking. The payment path in this project is intentionally deterministic rather than AI-driven.',
      suggestions: ['Open checkout', 'How does checkout work?', 'What does this app do?']
    };
  }

  if (/checkout|place order|order confirmation|confirm order|shipping information|payment method/.test(normalizedQuestion)) {
    return {
      text: 'Checkout collects shipping details, validates the form, lets you choose a payment method, simulates processing, creates a demo order ID, and clears the cart after a successful order.',
      suggestions: ['Open checkout', 'What payment methods are available?', "What's in my cart?"]
    };
  }

  if (/categories|catalog|how many products|product count|products available/.test(normalizedQuestion)) {
    return {
      text: buildCatalogSummary(),
      suggestions: ['Open products', 'How do search and filters work?', 'What does this app do?']
    };
  }

  if (/(search|filter|sort)/.test(normalizedQuestion) && /(product|catalog|page)/.test(normalizedQuestion)) {
    return {
      text: 'The Products page includes a search box, a category filter, and sorting options for name, price low to high, price high to low, and rating.',
      suggestions: ['Open products', 'How many products are in the demo?', 'What categories exist?']
    };
  }

  if (/chatbot|assistant/.test(normalizedQuestion) && /(how|work|inside|built|can you do|what can you answer)/.test(normalizedQuestion)) {
    return {
      text: 'I am a built-in ShopNova assistant. I answer from the application knowledge bundled into the frontend plus your live cart and current page, so I can help without calling any outside AI service.',
      suggestions: ['What can you answer?', 'Which services exist?', "What's in my cart?"]
    };
  }

  const navigationReply = getNavigationReply(normalizedQuestion, context);
  if (navigationReply) return navigationReply;

  const knowledgeBaseReply = findKnowledgeBaseReply(question);
  if (knowledgeBaseReply) return knowledgeBaseReply;

  return {
    text: 'I can answer questions about this ShopNova application: the storefront pages, service layout, ports, docs, coupons, payment methods, and your current cart or page state.',
    suggestions: SHOP_ASSISTANT_DEFAULT_SUGGESTIONS
  };
}

function createBuiltInAssistantStatus() {
  return { checked: true, aiEnabled: false, provider: 'builtin', model: null };
}

async function fetchAssistantProviderStatus() {
  try {
    const response = await fetch(CHAT_STATUS_ENDPOINT, { headers: { Accept: 'application/json' } });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    return {
      checked: true,
      aiEnabled: !!data.aiEnabled,
      provider: data.provider || 'builtin',
      model: data.model || null
    };
  } catch (error) {
    return createBuiltInAssistantStatus();
  }
}

function buildRemoteHistory(messages) {
  return messages.filter(message => message.role === 'user' || message.role === 'assistant').slice(-6).map(message => ({ role: message.role, text: message.text }));
}

async function requestRemoteAssistantReply({ question, currentPage, cart, history }) {
  const response = await fetch(CHAT_COMPLETION_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Accept: 'application/json'
    },
    body: JSON.stringify({ question, currentPage, cart, history })
  });

  let data = null;
  try {
    data = await response.json();
  } catch (error) {
    data = null;
  }

  if (!response.ok) throw new Error(data?.error || `HTTP ${response.status}`);
  if (!data?.answer) throw new Error('The AI provider returned an empty response.');
  return data;
}

function ShopAssistant({ currentPage, onNavigate }) {
  const { cart } = useCart();
  const [isOpen, setIsOpen] = useState(false);
  const [draft, setDraft] = useState('');
  const [messages, setMessages] = useState(() => [createAssistantWelcomeMessage()]);
  const [assistantStatus, setAssistantStatus] = useState({ checked: false, aiEnabled: false, provider: 'builtin', model: null });
  const [isResponding, setIsResponding] = useState(false);
  const messageIdRef = useRef(0);
  const messagesEndRef = useRef(null);

  const nextMessageId = () => {
    messageIdRef.current += 1;
    return `assistant-message-${messageIdRef.current}`;
  };

  useEffect(() => {
    if (!isOpen) return;
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, [isOpen, messages]);

  useEffect(() => {
    let cancelled = false;
    fetchAssistantProviderStatus().then(status => {
      if (!cancelled) setAssistantStatus(status);
    });
    return () => { cancelled = true; };
  }, []);

  const submitQuestion = useCallback(async (question) => {
    const trimmedQuestion = question.trim();
    if (!trimmedQuestion || isResponding) return;

    const reply = resolveAssistantReply(trimmedQuestion, { cart, currentPage });
    const history = buildRemoteHistory(messages);

    setMessages(prev => [
      ...prev,
      { id: nextMessageId(), role: 'user', text: trimmedQuestion }
    ]);

    setDraft('');
    setIsOpen(true);

    if (reply.actionPage && reply.actionPage !== currentPage) {
      onNavigate(reply.actionPage);
    }

    if (!assistantStatus.aiEnabled) {
      setMessages(prev => [
        ...prev,
        { id: nextMessageId(), role: 'assistant', text: reply.text, suggestions: reply.suggestions || SHOP_ASSISTANT_DEFAULT_SUGGESTIONS }
      ]);
      return;
    }

    setIsResponding(true);

    try {
      const remote = await requestRemoteAssistantReply({ question: trimmedQuestion, currentPage, cart, history });
      setMessages(prev => [
        ...prev,
        { id: nextMessageId(), role: 'assistant', text: remote.answer, suggestions: reply.suggestions || SHOP_ASSISTANT_DEFAULT_SUGGESTIONS }
      ]);
    } catch (error) {
      setMessages(prev => [
        ...prev,
        {
          id: nextMessageId(),
          role: 'assistant',
          text: `${reply.text}\n\nI couldn't reach Gemini just now, so I switched to the built-in ShopNova answer.`,
          suggestions: reply.suggestions || SHOP_ASSISTANT_DEFAULT_SUGGESTIONS
        }
      ]);
    } finally {
      setIsResponding(false);
    }
  }, [assistantStatus.aiEnabled, cart, currentPage, isResponding, messages, onNavigate]);

  const handleSubmit = (event) => {
    event.preventDefault();
    submitQuestion(draft);
  };

  const handleKeyDown = (event) => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      submitQuestion(draft);
    }
  };

  const handleReset = () => {
    setMessages([createAssistantWelcomeMessage()]);
    setDraft('');
  };

  const assistantStatusLabel = !assistantStatus.checked
    ? 'Checking AI connection...'
    : assistantStatus.aiEnabled
      ? `Gemini live via ${assistantStatus.model || 'configured model'}`
      : 'Built-in answers only';

  return (
    <>
      {isOpen && (
        <section className="assistant-panel" role="dialog" aria-modal="false"
                 aria-labelledby="shop-assistant-title" id="shop-assistant-panel">
          <div className="assistant-panel__header">
            <div>
              <p className="assistant-panel__eyebrow">Built-in help</p>
              <h2 className="assistant-panel__title" id="shop-assistant-title">ShopNova Assistant</h2>
              <p className="assistant-panel__status">{assistantStatusLabel}</p>
            </div>
            <div className="assistant-panel__actions">
              <button className="assistant-icon-button" type="button" onClick={handleReset}
                      aria-label="Reset assistant conversation">↺</button>
              <button className="assistant-icon-button" type="button" onClick={() => setIsOpen(false)}
                      aria-label="Close assistant">×</button>
            </div>
          </div>
          <div className="assistant-panel__body">
            <div className="assistant-messages" role="log" aria-live="polite" aria-label="Assistant conversation">
              {messages.map(message => (
                <article key={message.id} className={`assistant-message assistant-message--${message.role}`}>
                  {message.role === 'assistant' && <p className="assistant-message__label">ShopNova Assistant</p>}
                  <p className="assistant-message__text">{message.text}</p>
                  {message.role === 'assistant' && message.suggestions?.length > 0 && (
                    <div className="assistant-message__suggestions">
                      {message.suggestions.map(suggestion => (
                        <button key={`${message.id}-${suggestion}`} type="button"
                                className="assistant-chip" onClick={() => submitQuestion(suggestion)}>
                          {suggestion}
                        </button>
                      ))}
                    </div>
                  )}
                </article>
              ))}
              <div ref={messagesEndRef} />
            </div>
            <form className="assistant-composer" onSubmit={handleSubmit}>
              <label className="sr-only" htmlFor="shop-assistant-input">Ask a question about this application</label>
              <textarea className="assistant-composer__input" id="shop-assistant-input"
                        value={draft} onChange={(e) => setDraft(e.target.value)}
                        onKeyDown={handleKeyDown} rows={3}
                        placeholder="Ask about services, coupons, checkout, ports, or your current cart..." />
              <div className="assistant-composer__footer">
                <p className="assistant-composer__hint">
                  {assistantStatus.aiEnabled
                    ? 'Gemini is connected through the local proxy server.'
                    : 'Using built-in app knowledge until a Gemini API key is configured in the local server.'}
                </p>
                <button className="btn btn--primary assistant-composer__send" type="submit" disabled={isResponding}>
                  {isResponding ? 'Thinking...' : 'Send'}
                </button>
              </div>
            </form>
          </div>
        </section>
      )}

      <button className="assistant-launcher" type="button" onClick={() => setIsOpen(prev => !prev)}
              aria-expanded={isOpen} aria-controls="shop-assistant-panel" id="shop-assistant-launcher">
        <span className="assistant-launcher__icon" aria-hidden="true">💬</span>
        <span className="assistant-launcher__text">{isOpen ? 'Hide Assistant' : 'Ask the App'}</span>
      </button>
    </>
  );
}

function ProductCard({ product, style }) {
  const { dispatch } = useCart();
  const { addToast } = useToast();
  const isOutOfStock = product.stock === 0;

  const handleAddToCart = (e) => {
    e.stopPropagation();
    if (isOutOfStock) return;
    dispatch({ type: 'ADD_ITEM', payload: { productId: product.id, productName: product.name, imageUrl: product.imageUrl, price: product.price, quantity: 1, category: product.category } });
    addToast(`${product.name} added to cart`);
  };

  const renderStars = (rating) => {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5;
    return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
  };

  const stockLabel = isOutOfStock
    ? { text: 'Out of Stock', cls: 'out' }
    : product.stock <= 10 ? { text: `Only ${product.stock} left`, cls: 'low' }
    : { text: 'In Stock', cls: 'available' };

  return (
    <article className="product-card" style={style} role="article"
             aria-label={`${product.name}, ₹${product.price.toFixed(2)}`} id={`product-${product.id}`}>
      <div className="product-card__image-wrapper">
        <img className="product-card__image" src={product.imageUrl} alt={product.name} loading="lazy" />
        {product.rating >= 4.7 && <span className="product-card__badge" aria-label="Top rated">Top Rated</span>}
        <button className="product-card__wishlist" aria-label={`Add ${product.name} to wishlist`}>♡</button>
      </div>
      <div className="product-card__body">
        <span className="product-card__category">{product.category}</span>
        <h3 className="product-card__name">{product.name}</h3>
        <div className="product-card__rating" aria-label={`Rating: ${product.rating} out of 5`}>
          <span className="product-card__stars" aria-hidden="true">{renderStars(product.rating)}</span>
          <span className="product-card__rating-text">{product.rating}</span>
        </div>
        <div className="product-card__footer">
          <div className="product-card__price"><span className="product-card__price-currency">₹</span>{product.price.toFixed(2)}</div>
          <button className="product-card__add-btn" onClick={handleAddToCart} disabled={isOutOfStock}
                  aria-label={isOutOfStock ? `${product.name} is out of stock` : `Add ${product.name} to cart`}
                  id={`add-to-cart-${product.id}`}>
            {isOutOfStock ? '✕' : '+'}
          </button>
        </div>
        <div className={`product-card__stock product-card__stock--${stockLabel.cls}`}>{stockLabel.text}</div>
      </div>
    </article>
  );
}

function ProductListingPage() {
  const { products, loading, error } = useFetchProducts();
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('');
  const [sortBy, setSortBy] = useState('name');
  const [showHero, setShowHero] = useState(true);
  const categories = [...new Set(products.map(p => p.category))].sort();

  const filtered = products
    .filter(p => {
      const matchesSearch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.description.toLowerCase().includes(search.toLowerCase());
      return matchesSearch && (!category || p.category === category);
    })
    .sort((a, b) => {
      switch (sortBy) {
        case 'price-asc': return a.price - b.price;
        case 'price-desc': return b.price - a.price;
        case 'rating': return b.rating - a.rating;
        default: return a.name.localeCompare(b.name);
      }
    });

  if (error) return (<div className="page"><div className="error-state" role="alert"><span className="error-state__icon">⚠️</span><h2 className="error-state__title">Unable to Load Products</h2><p className="error-state__message">{error}</p><button className="btn btn--primary" onClick={() => window.location.reload()}>Try Again</button></div></div>);

  return (
    <div className="page">
      {showHero && (
        <section className="hero" aria-label="Welcome banner">
          <div className="hero__badge"><span className="hero__badge-dot"></span>New Collection Available</div>
          <h1 className="hero__title">Discover <span className="hero__title-accent">Premium</span><br />Products You'll Love</h1>
          <p className="hero__description">Curated collections from top brands. Free shipping on orders over ₹99. Quality guaranteed with every purchase.</p>
          <div className="hero__actions">
            <button className="btn btn--primary btn--lg" onClick={() => setShowHero(false)}>Shop Now →</button>
            <button className="btn btn--secondary btn--lg">View Collections</button>
          </div>
        </section>
      )}
      <div className="page__header">
        <h2 className="page__title page__title--gradient">All Products</h2>
        <p className="page__subtitle">{filtered.length} products available</p>
      </div>
      <div className="filter-bar" role="search" aria-label="Product filters">
        <input className="filter-bar__search" type="search" placeholder="Search products..." value={search}
               onChange={(e) => setSearch(e.target.value)} aria-label="Search products" id="product-search" />
        <select className="filter-bar__select" value={category} onChange={(e) => setCategory(e.target.value)}
                aria-label="Filter by category" id="category-filter">
          <option value="">All Categories</option>
          {categories.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <select className="filter-bar__select" value={sortBy} onChange={(e) => setSortBy(e.target.value)}
                aria-label="Sort products" id="sort-products">
          <option value="name">Sort by Name</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      {loading ? <ProductGridSkeleton /> : filtered.length === 0 ? (
        <div className="empty-state"><span className="empty-state__icon">🔍</span><h3 className="empty-state__title">No Products Found</h3><p className="empty-state__description">Try adjusting your search or filters.</p><button className="btn btn--secondary" onClick={() => { setSearch(''); setCategory(''); }}>Clear Filters</button></div>
      ) : (
        <div className="product-grid" role="list" aria-label="Product catalog">
          {filtered.map((product, i) => <ProductCard key={product.id} product={product} style={{ animationDelay: `${i * 60}ms` }} />)}
        </div>
      )}
    </div>
  );
}

function CheckoutPage({ onNavigate }) {
  const { cart, dispatch } = useCart();
  const { addToast } = useToast();
  const [paymentMethod, setPaymentMethod] = useState('credit_card');
  const [processing, setProcessing] = useState(false);
  const [orderPlaced, setOrderPlaced] = useState(false);
  const [orderId, setOrderId] = useState('');
  const [formData, setFormData] = useState({ fullName: '', email: '', phone: '', address: '', city: '', state: '', zip: '' });
  const [errors, setErrors] = useState({});

  const handleChange = (field) => (e) => { setFormData(prev => ({ ...prev, [field]: e.target.value })); if (errors[field]) setErrors(prev => ({ ...prev, [field]: null })); };

  const validate = () => {
    const e = {};
    if (!formData.fullName.trim()) e.fullName = 'Full name is required';
    if (!formData.email.trim()) e.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) e.email = 'Invalid email';
    if (!formData.phone.trim()) e.phone = 'Phone is required';
    if (!formData.address.trim()) e.address = 'Address is required';
    if (!formData.city.trim()) e.city = 'City is required';
    if (!formData.state.trim()) e.state = 'State is required';
    if (!formData.zip.trim()) e.zip = 'ZIP code is required';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!validate()) { addToast('Please fill in all required fields', 'error'); return; }
    setProcessing(true);
    await new Promise(r => setTimeout(r, 2000));
    setOrderId(`ORD-${Date.now().toString(36).toUpperCase()}`);
    setOrderPlaced(true);
    dispatch({ type: 'CLEAR_CART' });
    setProcessing(false);
    addToast('Order placed successfully!');
  };

  if (cart.items.length === 0 && !orderPlaced) return (
    <div className="page"><div className="empty-state"><span className="empty-state__icon">🛒</span><h1 className="empty-state__title">Cart is Empty</h1><p className="empty-state__description">Add items to your cart before checkout.</p><button className="btn btn--primary" onClick={() => onNavigate('products')}>Browse Products</button></div></div>
  );

  if (orderPlaced) return (
    <div className="page"><div className="order-confirmation" role="status"><div className="order-confirmation__icon">✓</div><h1 className="order-confirmation__title">Order Confirmed!</h1><p className="order-confirmation__order-id">Order ID: <span>{orderId}</span></p><p className="page__subtitle" style={{ marginBottom: '32px' }}>Thank you for your purchase. You'll receive a confirmation email shortly.</p><button className="btn btn--primary btn--lg" onClick={() => onNavigate('products')}>Continue Shopping</button></div></div>
  );

  const renderInput = (field, label, type, placeholder) => (
    <div className="form-group">
      <label className="form-group__label" htmlFor={`checkout-${field}`}>{label} *</label>
      <input className={`form-group__input ${errors[field] ? 'form-group__input--error' : ''}`} type={type} id={`checkout-${field}`} value={formData[field]} onChange={handleChange(field)} placeholder={placeholder} aria-required="true" aria-invalid={!!errors[field]} />
      {errors[field] && <span className="form-group__error" role="alert">{errors[field]}</span>}
    </div>
  );

  return (
    <div className="page">
      <div className="page__header"><h1 className="page__title page__title--gradient">Checkout</h1><p className="page__subtitle">Complete your order</p></div>
      <form className="checkout-layout" onSubmit={handleSubmit} noValidate>
        <div className="checkout-form">
          <section className="form-section" aria-label="Shipping information">
            <h2 className="form-section__title"><span className="form-section__title-number">1</span>Shipping Information</h2>
            {renderInput('fullName', 'Full Name', 'text', 'John Doe')}
            <div className="form-row">{renderInput('email', 'Email', 'email', 'john@example.com')}{renderInput('phone', 'Phone', 'tel', '+1 (555) 123-4567')}</div>
            {renderInput('address', 'Address', 'text', '123 Main Street, Apt 4B')}
            <div className="form-row">{renderInput('city', 'City', 'text', 'New York')}{renderInput('state', 'State', 'text', 'NY')}</div>
            <div style={{ maxWidth: '200px' }}>{renderInput('zip', 'ZIP Code', 'text', '10001')}</div>
          </section>
          <section className="form-section" aria-label="Payment method">
            <h2 className="form-section__title"><span className="form-section__title-number">2</span>Payment Method</h2>
            <div className="payment-methods" role="radiogroup" aria-label="Select payment method">
              {[{ id: 'credit_card', icon: '💳', name: 'Credit Card' }, { id: 'debit_card', icon: '🏦', name: 'Debit Card' }, { id: 'upi', icon: '📱', name: 'UPI' }, { id: 'net_banking', icon: '🌐', name: 'Net Banking' }].map(m => (
                <div key={m.id} className={`payment-method ${paymentMethod === m.id ? 'selected' : ''}`} role="radio" aria-checked={paymentMethod === m.id} tabIndex={0} onClick={() => setPaymentMethod(m.id)} onKeyDown={(e) => e.key === 'Enter' && setPaymentMethod(m.id)} aria-label={m.name}>
                  <div className="payment-method__icon">{m.icon}</div><div className="payment-method__name">{m.name}</div>
                </div>
              ))}
            </div>
          </section>
        </div>
        <aside className="cart-summary" aria-label="Order summary">
          <h2 className="cart-summary__title">Order Summary</h2>
          {cart.items.map(item => (<div key={item.productId} className="cart-summary__row"><span className="cart-summary__label" style={{ fontSize: '0.85rem' }}>{item.productName} × {item.quantity}</span><span className="cart-summary__value">${item.lineTotal.toFixed(2)}</span></div>))}
          <hr className="cart-summary__divider" />
          <div className="cart-summary__row"><span className="cart-summary__label">Subtotal</span><span className="cart-summary__value">${cart.subtotal.toFixed(2)}</span></div>
          {cart.discount > 0 && <div className="cart-summary__row"><span className="cart-summary__label">Discount</span><span className="cart-summary__value cart-summary__value--discount">−${cart.discount.toFixed(2)}</span></div>}
          <div className="cart-summary__row"><span className="cart-summary__label">Shipping</span><span className="cart-summary__value" style={{color: 'var(--color-accent-success)'}}>{cart.subtotal >= 99 ? 'FREE' : '₹9.99'}</span></div>
          <div className="cart-summary__row"><span className="cart-summary__label">Tax (8%)</span><span className="cart-summary__value">${(cart.subtotal * 0.08).toFixed(2)}</span></div>
          <hr className="cart-summary__divider" />
          <div className="cart-summary__total"><span className="cart-summary__total-label">Total</span><span className="cart-summary__total-value">${(cart.total + (cart.subtotal < 99 ? 9.99 : 0) + cart.subtotal * 0.08).toFixed(2)}</span></div>
          <button className="btn btn--primary cart-summary__checkout-btn" type="submit" disabled={processing} id="place-order-btn">{processing ? 'Processing...' : 'Place Order →'}</button>
        </aside>
      </form>
    </div>
  );
}

// ================================================================
// App
// ================================================================
function App() {
  const [currentPage, setCurrentPage] = useState('products');
  const handleNavigate = useCallback((page) => { setCurrentPage(page); window.scrollTo({ top: 0, behavior: 'smooth' }); }, []);

  const renderPage = () => {
    switch (currentPage) {
      case 'products': return <ProductListingPage />;
      case 'cart': return <CartPage onNavigate={handleNavigate} />;
      case 'checkout': return <CheckoutPage onNavigate={handleNavigate} />;
      default: return <ProductListingPage />;
    }
  };

  return (
    <CartProvider>
      <ToastProvider>
        <Navigation currentPage={currentPage} onNavigate={handleNavigate} />
        <main id="main-content" role="main">{renderPage()}</main>
        <ShopAssistant currentPage={currentPage} onNavigate={handleNavigate} />
      </ToastProvider>
    </CartProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);
    </script>
</body>
</html>
