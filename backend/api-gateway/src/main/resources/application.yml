server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: product-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/products/**
        
        - id: cart-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/cart/**
            
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
            
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
            
        - id: user-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**

# Important: The gateway is responsible for stripping JWT prefix, validating tokens,
# and injecting X-User-Id downstream. Security filters are omitted for brevity.
